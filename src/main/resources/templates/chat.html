<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herb Harmony - Ancient Wisdom AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .chat-container { 
            height: 65vh; 
            overflow-y: auto; 
            border: 1px solid #dee2e6;
            border-radius: 10px;
            background: white;
            padding: 20px;
        }
        .message { 
            margin-bottom: 15px; 
            padding: 12px 16px; 
            border-radius: 18px; 
            max-width: 80%;
            line-height: 1.5;
        }
        .user-message { 
            background-color: #d1fae5; 
            margin-left: auto; 
            border-bottom-right-radius: 4px;
        }
        .bot-message { 
            background-color: #f3e8ff; 
            margin-right: auto; 
            border-bottom-left-radius: 4px;
        }
        .message strong { display: block; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="text-center mb-4">
            <h2>🌿 Herb Harmony</h2>
            <p class="text-muted">Ancient Wisdom AI • Ayurveda • TCM • Korean Traditions</p>
        </div>

        <div id="chatContainer" class="chat-container mb-3 shadow-sm">
            <!-- Messages will appear here -->
        </div>

        <div class="mb-3">
    <label class="form-label fw-bold">Choose Tradition:</label>
    <div class="btn-group w-100" role="group">
        <input type="radio" class="btn-check" name="tradition" id="mixed" value="mixed" checked>
        <label class="btn btn-outline-success" for="mixed">🌿 Mixed</label>

        <input type="radio" class="btn-check" name="tradition" id="ayurveda" value="ayurveda">
        <label class="btn btn-outline-success" for="ayurveda">🪔 Ayurveda</label>

        <input type="radio" class="btn-check" name="tradition" id="tcm" value="tcm">
        <label class="btn btn-outline-success" for="tcm">☯️ TCM</label>

        <input type="radio" class="btn-check" name="tradition" id="korean" value="korean">
        <label class="btn btn-outline-success" for="korean">🇰🇷 Korean</label>
    </div>
</div>

        <div class="input-group">
            <input type="text" id="userInput" class="form-control form-control-lg" 
                   placeholder="E.g. I have poor digestion or low energy..." 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn btn-success btn-lg" onclick="sendMessage()">Send</button>
            <button class="btn btn-outline-secondary btn-lg" onclick="clearChat()">Clear</button>
        </div>
        <small class="text-muted">Press Enter to send • Powered by Spring Boot + OpenAI</small>
    </div>

    <script>
        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            
            if (role === 'user') {
                div.className = 'message user-message';
                div.innerHTML = `<strong>You</strong>${content}`;
            } else {
                div.className = 'message bot-message';
                div.innerHTML = `<strong>Herb Harmony</strong>${content}`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;

    // Get selected tradition
    const tradition = document.querySelector('input[name="tradition"]:checked').value;

    addMessage('user', message);
    input.value = '';

    fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            content: message, 
            tradition: tradition 
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data && data.content) {
            addMessage('assistant', data.content);
        } else {
            addMessage('assistant', 'Sorry, no response received.');
        }
    })
    .catch(() => {
        addMessage('assistant', 'Sorry, there was an error connecting to the AI.');
    });
}
        function clearChat() {
            fetch('/clear', { method: 'POST' })
                .then(() => {
                    document.getElementById('chatContainer').innerHTML = '';
                });
        }

        // Optional: Welcome message
        window.onload = function() {
            const container = document.getElementById('chatContainer');
            if (container.children.length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'message bot-message';
                welcome.innerHTML = `<strong>Herb Harmony</strong>Hello! I'm your ancient wisdom guide. Tell me about your health goal or issue (e.g. digestion, energy, skin, stress).`;
                container.appendChild(welcome);
            }
        }
    </script>
</body>
</html>
